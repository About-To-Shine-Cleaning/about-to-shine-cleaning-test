<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="robots" content="noindex,nofollow,noarchive" />
  <title>ATS Admin Tools</title>
  <link rel="stylesheet" href="/admin/admin-layout.css" />
  <script defer src="/admin/admin-nav.js"></script>
</head>
<body class="ats-admin">
<header class="ats-header">
  <div class="ats-header-inner">
    <a class="ats-brand" href="/admin/" aria-label="Go to Admin Home"><img src="/assets/images/logo-v2.png" alt="About To Shine Cleaning Logo" /></a>
    <div class="ats-header-actions">
      <a class="ats-live-btn" href="https://abouttoshinecleaning.com" target="_blank" rel="noopener">Go to Live Website</a>
      <button class="ats-burger" type="button" aria-label="Open menu" aria-haspopup="dialog" aria-controls="atsNavDrawer" aria-expanded="false"><span></span><span></span><span></span></button>
    </div>
  </div>
</header>
<main class="ats-main"><div class="ats-container">
  <section class="ats-card">
    <h1 class="ats-title">Admin Tools</h1>
    <p class="ats-subtitle">Quick access to internal tools grouped under one admin hub.</p>
  </section>
  <section class="ats-row">
    <article class="ats-card">
      <h2 style="margin-top:0">Schedule</h2>
      <p class="ats-subtitle">Mobile-first day-box scheduler for this week and next week.</p>
      <a class="ats-btn primary" href="/admin/schedule/">Open Schedule</a>
    </article>
    <article class="ats-card">
      <h2 style="margin-top:0">Site Report</h2>
      <p class="ats-subtitle">GA4 traffic insights and visitor analytics.</p>
      <a class="ats-btn primary" href="/admin/tools/site-report/">Open Site Report</a>
    </article>
  </section>
</div></main>
</body>
</html>
