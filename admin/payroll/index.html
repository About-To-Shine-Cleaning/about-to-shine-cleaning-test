<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>ATS Payroll</title>
<link rel="stylesheet" href="/admin/admin-layout.css" />
<script defer src="/admin/admin-nav.js"></script>
</head>
<body class="ats-admin">
<header class="ats-header">
  <div class="ats-header-inner">
    <a class="ats-brand" href="/admin/">
      <img src="/assets/images/logo-v2.png" />
    </a>
  </div>
</header>

<main class="ats-main">
<div class="ats-container">

<div class="wrap">

<div class="top">
  <div class="pill"><strong>ATS Payroll</strong></div>
  <div class="pill" id="pillWho">—</div>
</div>

<div class="card">
  <div class="row" style="justify-content:space-between">
    <div>
      <div class="muted">Current Pay Period</div>
      <div id="periodId">—</div>
      <div>
        <span id="periodStart"></span> → <span id="periodEnd"></span>
        • <span id="periodStatus"></span>
      </div>
    </div>

    <div class="row">
      <button id="btnRefresh">Refresh</button>
      <button id="btnGenerate">Generate</button>
      <button id="btnLock">Lock</button>
      <button id="btnPast">Past Payroll</button>
      <button id="btnExport">Export QB</button>
    </div>
  </div>
</div>

<div class="card">
  <h3>Summary</h3>
  <table>
    <tbody id="summaryBody"></tbody>
  </table>
</div>

<div class="card">
  <h3>Payments</h3>
  <table>
    <tbody id="paymentsBody"></tbody>
  </table>
</div>

</div>

<script src="./payroll.js"></script>
</div>
</main>
</body>
</html>
